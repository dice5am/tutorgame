<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Antenna -->
  <line x1="50" y1="20" x2="50" y2="8" stroke="#7f8c8d" stroke-width="4" stroke-linecap="round"/>
  <circle cx="50" cy="8" r="5" fill="#f1c40f" stroke="#2d3436" stroke-width="2"/>
  <!-- Ears -->
  <rect x="14" y="38" width="8" height="16" rx="3" fill="#34495e" stroke="#2d3436" stroke-width="2.5"/>
  <rect x="78" y="38" width="8" height="16" rx="3" fill="#34495e" stroke="#2d3436" stroke-width="2.5"/>
  <!-- Head -->
  <rect x="20" y="20" width="60" height="52" rx="12" fill="#95a5a6" stroke="#2d3436" stroke-width="3"/>
  <!-- Eyes Screen -->
  <rect x="28" y="28" width="44" height="20" rx="6" fill="#2c3e50"/>
  <!-- Glowing Eyes -->
  <circle cx="38" cy="38" r="5" fill="#55efc4"/>
  <circle cx="62" cy="38" r="5" fill="#55efc4"/>
  <!-- Mouth -->
  <rect x="36" y="54" width="28" height="8" rx="2" fill="#bdc3c7" stroke="#2d3436" stroke-width="2"/>
  <!-- Vertical teeth lines -->
  <line x1="43" y1="54" x2="43" y2="62" stroke="#2d3436" stroke-width="1.5"/>
  <line x1="50" y1="54" x2="50" y2="62" stroke="#2d3436" stroke-width="1.5"/>
  <line x1="57" y1="54" x2="57" y2="62" stroke="#2d3436" stroke-width="1.5"/>
</svg>