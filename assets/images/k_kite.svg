<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Tail -->
  <path d="M 50 78 Q 40 86, 50 98" stroke="#2d3436" stroke-width="2.5" fill="none"/>
  <!-- Bows on Tail -->
  <polygon points="41,83 47,83 44,80" fill="#ff7675" stroke="#2d3436" stroke-width="1.5"/>
  <polygon points="41,83 47,83 44,86" fill="#ff7675" stroke="#2d3436" stroke-width="1.5"/>
  <polygon points="44,91 50,91 47,88" fill="#55efc4" stroke="#2d3436" stroke-width="1.5"/>
  <polygon points="44,91 50,91 47,94" fill="#55efc4" stroke="#2d3436" stroke-width="1.5"/>
  <!-- Kite Main Body -->
  <g transform="rotate(15 50 45)">
    <polygon points="50,10 80,45 50,78 20,45" fill="#ffeaa7" stroke="#2d3436" stroke-width="3" stroke-linejoin="round"/>
    <!-- Diagonals -->
    <line x1="50" y1="10" x2="50" y2="78" stroke="#2d3436" stroke-width="2"/>
    <line x1="20" y1="45" x2="80" y2="45" stroke="#2d3436" stroke-width="2"/>
    <!-- Colors -->
    <path d="M 50 10 L 80 45 L 50 45 Z" fill="#ff7675"/>
    <path d="M 50 10 L 20 45 L 50 45 Z" fill="#74b9ff"/>
    <path d="M 50 78 L 20 45 L 50 45 Z" fill="#55efc4"/>
    <path d="M 50 78 L 80 45 L 50 45 Z" fill="#a29bfe"/>
  </g>
</svg>